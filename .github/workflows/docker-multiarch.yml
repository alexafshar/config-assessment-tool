name: docker-multiarch

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-linux-multiarch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # We build directly into the multi-arch tag here because it's efficient
      # and avoids complex manifest merges for just Linux architectures.
      # If we need to merge with Windows later, we can do that in a separate step or job
      # but standardizing on this ensures Linux users get the right image immediately.
      - name: Build and push Linux image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # We tag it with both :vX.Y.Z (general tag) and :vX.Y.Z-linux (specific)
          # The general tag might be overwritten by the manifest merge if we enable windows
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-linux:${{ steps.meta.outputs.version }}
          provenance: false

  # Windows build is separate and less frequent, keeping it here but isolated
  build-windows:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Windows image
        run: |
          docker build -f Dockerfile-windows -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-windows-amd64:${{ steps.meta.outputs.version }} .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-windows-amd64:${{ steps.meta.outputs.version }}

  # Optional: Manifest creation to join Linux and Windows under one tag if Windows ran
  merge-manifest:
    needs: [build-linux-multiarch, build-windows]
    if: success() && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Create and push manifest list
        run: |
          BASE_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          TAG="${{ steps.meta.outputs.version }}"
          
          # We are merging the linux image (which is already multi-arch for linux)
          # and the windows image.
          # Note: Docker manifest create expects images to exist.
          
          echo "Creating manifest for tag: $TAG combining Linux and Windows..."
          
          docker manifest create "${BASE_IMAGE}:${TAG}" \
            "${BASE_IMAGE}-linux:${TAG}" \
            "${BASE_IMAGE}-windows-amd64:${TAG}"
            
          docker manifest push "${BASE_IMAGE}:${TAG}"
