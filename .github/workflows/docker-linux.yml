name: docker-linux

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker repo
        id: set_repo
        run: |
          if [[ "${{ github.repository_owner }}" == "appdynamics" ]]; then
            echo "repo=appdynamics" >> $GITHUB_OUTPUT
          else
            echo "repo=${{ github.repository_owner }}" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image using Makefile
        run: |
          # We cannot use 'make build-image' directly for multi-arch build and push in one go easily 
          # without modifying Makefile or using docker buildx command directly here.
          # The user wants to use this workflow for multi-arch.
          # I will replace the make command with docker buildx command.
          TAG=$(cat VERSION)
          REPO="${{ steps.set_repo.outputs.repo }}"
          IMAGE="ghcr.io/${REPO}/config-assessment-tool-linux-multiarch:${TAG}"
          
          docker buildx build \
            --platform linux/amd64,linux/arm64,linux/riscv64 \
            --tag $IMAGE \
            --push \
            -f Dockerfile .
            
          echo "image_tag=$IMAGE" >> $GITHUB_OUTPUT
