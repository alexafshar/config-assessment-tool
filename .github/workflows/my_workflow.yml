
name: My workflow

on:
  pull_request:
  workflow_dispatch:

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN}}

      - uses: mscoutermarsh/ascii-art-action@master
        with:
          text: 'SHIP IT'