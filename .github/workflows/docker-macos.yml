name: docker-macos

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: macos-12

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Docker is not natively available on macOS runners in GitHub Actions without setup
      # We usually use Colima or Docker Desktop, but standard actions might be tricky.
      # However, assuming the user simply wants to replicate the build process on a macOS runner
      # effectively building what they consider a "macOS" Docker image (which is likely just Linux under the hood mostly,
      # or they are cross-compiling).
      # BUT, GitHub Actions macos-latest runners DO NOT have Docker installed by default compatible with standard actions usually.
      # Let's try to install docker via colima or similar if needed, or assume they want to use `make build-image`.
      # Wait, running `docker` on macOS runner requires a VM (Colima/Lima).

      - name: Setup Docker using Homebrew
        run: |
          brew install docker colima
          colima start
          # Wait for docker socket to be ready
          sudo ln -sf $HOME/.colima/default/docker.sock /var/run/docker.sock

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker repo
        id: set_repo
        run: |
          if [[ "${{ github.repository_owner }}" == "appdynamics" ]]; then
            echo "repo=appdynamics" >> $GITHUB_OUTPUT
          else
            echo "repo=${{ github.repository_owner }}" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image using Makefile
        run: make build-image DOCKER_REPO=${{ steps.set_repo.outputs.repo }}

      - name: Get Docker image tag
        id: get_tag
        run: |
          TAG=$(cat VERSION)
          ARCH=$(uname | tr '[:upper:]' '[:lower:]')
          if [ "$ARCH" = "darwin" ]; then
            ARCH="macos"
          elif [ "$ARCH" = "linux" ]; then
            ARCH="linux"
          fi
          CHIP=$(uname -m)
          if [ "$CHIP" = "x86_64" ]; then
            CHIP="amd64"
          elif [ "$CHIP" = "arm64" ] || [ "$CHIP" = "aarch64" ]; then
            CHIP="arm"
          fi
          REPO="${{ steps.set_repo.outputs.repo }}"
          IMAGE_TAG="ghcr.io/${REPO}/config-assessment-tool-${ARCH}-${CHIP}:$TAG"
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Push Docker image
        run: docker push ${{ steps.get_tag.outputs.image_tag }}

